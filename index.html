<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>大潭電廠 住宿需求計算工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;background:#f0f2f5;color:#333}

/* Header */
.header{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.param-group{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:6px 12px;border-radius:6px}
.param-group label{font-size:13px;opacity:.9}
.param-group input,.param-group select{padding:4px 8px;border:1px solid rgba(255,255,255,.3);border-radius:4px;background:rgba(255,255,255,.9);color:#333;font-size:13px;width:60px}
.param-group select{width:auto}
.btn-confirm{padding:8px 20px;border:none;border-radius:6px;background:#f39c12;color:#fff;font-size:14px;font-weight:bold;cursor:pointer;transition:all .2s;letter-spacing:1px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.btn-confirm:hover{background:#e67e22;box-shadow:0 3px 10px rgba(0,0,0,.3);transform:translateY(-1px)}
.btn-confirm:active{transform:translateY(0);box-shadow:0 1px 3px rgba(0,0,0,.2)}

/* Main layout */
.main{display:flex;gap:0;height:calc(100vh - 64px)}
.panel-left{width:420px;min-width:350px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column;overflow:hidden}
.panel-right{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Import area */
.import-area{padding:16px;border-bottom:1px solid #e8e8e8}
.drop-zone{border:2px dashed #bbb;border-radius:8px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc}
.drop-zone:hover,.drop-zone.dragover{border-color:#2e86c1;background:#ebf5fb}
.drop-zone .icon{font-size:36px;margin-bottom:6px}
.drop-zone p{font-size:13px;color:#666}
.drop-zone .filename{color:#2e86c1;font-weight:bold;margin-top:6px}
input[type="file"]{display:none}

/* Table */
.table-section{flex:1;overflow:auto;padding:0}
.table-section table{width:100%;border-collapse:collapse;font-size:12px}
.table-section th{background:#f7f9fc;position:sticky;top:0;z-index:2;padding:8px 6px;border-bottom:2px solid #ddd;font-size:11px;color:#555;white-space:nowrap}
.table-section td{padding:6px;border-bottom:1px solid #eee;text-align:center;white-space:nowrap}
.table-section tr:hover{background:#f5f9ff}
.group-header{background:#eef3f8 !important;font-weight:bold;color:#1a5276}
.group-header td{padding:8px 6px;border-bottom:2px solid #ccc}
.cell-unit{font-weight:bold;color:#2c3e50}
.cell-ndt{color:#2e86c1}
.cell-et{color:#8e44ad}
.cell-f{font-weight:bold;font-size:13px}
.cell-g{font-weight:bold}
.cell-h{color:#27ae60;font-weight:bold}
.exceed{color:#e74c3c !important}
.total-row{background:#f0f4f8;font-weight:bold}
.total-row td{border-top:2px solid #999;padding:10px 6px}

/* Export btn */
.export-bar{padding:10px 16px;border-top:1px solid #e8e8e8;background:#fafbfc;display:flex;gap:8px;align-items:center}
.btn{padding:7px 16px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:bold;transition:all .2s}
.btn-primary{background:#2e86c1;color:#fff}
.btn-primary:hover{background:#1a6da3}
.btn-success{background:#27ae60;color:#fff}
.btn-success:hover{background:#1e8449}
.btn-outline{background:#fff;border:1px solid #bbb;color:#555}
.btn-outline:hover{background:#f0f0f0}
.export-info{font-size:11px;color:#888;margin-left:auto}

/* Chart area */
.chart-header{padding:12px 16px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.chart-header h2{font-size:15px;color:#2c3e50}
.chart-controls{display:flex;gap:4px;margin-left:auto}
.chart-controls button{padding:4px 10px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;font-size:11px}
.chart-controls button.active{background:#2e86c1;color:#fff;border-color:#2e86c1}
.chart-area{flex:1;overflow:auto;background:#fff;padding:8px}
.chart-area canvas{display:block}
.legend-bar{padding:8px 16px;background:#fff;border-top:1px solid #e8e8e8;display:flex;flex-wrap:wrap;justify-content:center;gap:4px 12px}
.legend-bar .li{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:3px}
.legend-bar .li:hover{background:#f0f0f0}
.legend-bar .li.dimmed{opacity:.2}
.legend-bar .lc{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.legend-bar .gl{font-weight:bold;color:#888;font-size:10px}

/* Tooltip */
.tooltip{position:fixed;background:rgba(30,50,70,.95);color:#fff;padding:12px 16px;border-radius:8px;font-size:12px;pointer-events:none;z-index:1000;display:none;max-width:300px;line-height:1.7}
.tooltip .td{font-weight:bold;font-size:13px;border-bottom:1px solid rgba(255,255,255,.3);padding-bottom:4px;margin-bottom:4px}
.tooltip .tr{display:flex;justify-content:space-between;gap:12px}
.tooltip .dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#aaa;gap:12px;padding:40px}
.empty-state .icon{font-size:60px;opacity:.4}
.empty-state p{font-size:14px}

/* Responsive */
@media(max-width:900px){.main{flex-direction:column}.panel-left{width:100%;max-height:50vh}}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ 大潭電廠 住宿需求計算工具</h1>
  <div class="header-right">
    <div class="param-group">
      <label>大潭總人數</label>
      <input type="number" id="totalPeople" value="26" min="1" max="100">
    </div>
    <div class="param-group">
      <label>住宿金額(未稅)</label>
      <input type="number" id="housingRate" value="2190" min="0" style="width:70px">
    </div>
    <div class="param-group">
      <label>G欄計算</label>
      <select id="gMode">
        <option value="ndt_et_bridge" selected>NDT+ET(橋接≤3天空檔)</option>
        <option value="inspection">NDT+ET檢測天數</option>
        <option value="overhaul">大修天數</option>
      </select>
    </div>
    <div class="param-group">
      <label>橋接上限(天)</label>
      <input type="number" id="bridgeGap" value="3" min="0" max="10" style="width:45px">
    </div>
    <div class="param-group">
      <label>計算期間</label>
      <input type="date" id="periodStart" style="width:130px">
      <span style="opacity:.7">～</span>
      <input type="date" id="periodEnd" style="width:130px">
      <button class="btn-reset-period" onclick="resetPeriod()" title="重設為全部期間" style="background:none;border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px">全部</button>
    </div>
    <button id="confirmBtn" class="btn-confirm" onclick="onConfirm()" title="確認參數並重新計算">✔ 確認計算</button>
  </div>
</div>

<div class="main">
  <!-- Left panel: import + table -->
  <div class="panel-left">
    <div class="import-area">
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📂</div>
        <p>點擊或拖放<br><b>大修檢測排程.xlsx</b></p>
        <div class="filename" id="fileName"></div>
      </div>
      <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(this.files[0])">
    </div>
    <div class="table-section" id="tableSection">
      <div class="empty-state" id="emptyTable">
        <div class="icon">📋</div>
        <p>匯入排程後自動產生住宿需求表</p>
      </div>
    </div>
    <div class="export-bar" id="exportBar" style="display:none">
      <button class="btn btn-success" onclick="exportExcel()">📥 匯出住宿需求表</button>
      <button class="btn btn-outline" onclick="exportExcel('full')">📊 匯出含明細</button>
      <span class="export-info" id="exportInfo"></span>
    </div>
  </div>

  <!-- Right panel: chart -->
  <div class="panel-right">
    <div class="chart-header">
      <h2>📊 大潭電廠用人堆疊圖</h2>
      <div class="chart-controls">
        <button class="active" onclick="setChartRes('day',this)">每日</button>
        <button onclick="setChartRes('week',this)">週平均</button>
      </div>
    </div>
    <div class="chart-area" id="chartArea">
      <div class="empty-state" id="emptyChart">
        <div class="icon">📈</div>
        <p>匯入排程後自動產生堆疊圖</p>
      </div>
      <canvas id="chart" style="display:none"></canvas>
    </div>
    <div class="legend-bar" id="legendBar" style="display:none"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ===== GLOBAL STATE =====
let scheduleData = null;   // parsed from Excel
let datanUnits = [];       // 大潭 units with NDT/ET info
let supportUnits = [];     // 支援 units
let allocationResult = []; // per-unit F, G results
let dailyData = [];        // day-by-day for chart
let chartRes = 'day';
let hiddenUnits = new Set();

const UNIT_COLORS = {
  'GT11':'#4E79A7','GT12':'#76B7B2','ST1':'#59A14F',
  'GT21':'#4E79A7','GT22':'#FF9DA7','GT23':'#76B7B2','ST2':'#59A14F',
  'GT31':'#76B7B2','GT32':'#4E79A7','ST3':'#59A14F',
  'GT41':'#F7CAC9','GT42':'#88B04B','ST4':'#92A8D1',
  'GT51':'#4E79A7','GT52':'#76B7B2','ST5':'#59A14F',
  'GT61':'#9C755F','GT62':'#BAB0AC','ST6':'#EDC948',
  'GT71':'#AF7AA1','GT72':'#FF6F61','ST7':'#6B5B95',
  'GT81':'#4E79A7','GT82':'#76B7B2','ST8':'#59A14F',
  'GT91':'#F28E2B','GT92':'#E15759','ST9':'#B07AA1',
};
const FALLBACK_COLORS = ['#e6194b','#3cb44b','#ffe119','#4363d8','#f58231','#911eb4','#42d4f4','#f032e6','#bfef45','#fabed4'];
let colorIdx = 0;
function getColor(unit) {
  if (UNIT_COLORS[unit]) return UNIT_COLORS[unit];
  const c = FALLBACK_COLORS[colorIdx % FALLBACK_COLORS.length];
  colorIdx++;
  UNIT_COLORS[unit] = c;
  return c;
}

// ===== FILE IMPORT =====
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  document.getElementById('fileName').textContent = '✅ ' + file.name;
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, dateNF:'yyyy-mm-dd'});
    parseSchedule(rows, ws);
  };
  reader.readAsArrayBuffer(file);
}

function parseSchedule(rows, ws) {
  // Find header row
  let headerIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    const r = rows[i];
    if (r && r.some(c => c && c.toString().includes('機組名稱'))) { headerIdx = i; break; }
  }
  if (headerIdx < 0) { alert('找不到表頭（機組名稱欄位），請確認檔案格式'); return; }

  const header = rows[headerIdx].map(h => (h||'').toString().trim());
  const colMap = {};
  header.forEach((h, i) => {
    if (h.includes('機組名稱')) colMap.unit = i;
    if (h.includes('大修開始')) colMap.ohStart = i;
    if (h.includes('大修結束')) colMap.ohEnd = i;
    if (h === 'NDT開始日' || h.includes('NDT開始')) colMap.ndtStart = i;
    if (h === 'NDT結束日' || h.includes('NDT結束')) colMap.ndtEnd = i;
    if (h.includes('NDT持續') || h.includes('NDT天數')) colMap.ndtDays = i;
    if (h.includes('NDT人數')) colMap.ndtPpl = i;
    if (h === 'ET開始日' || h.includes('ET開始')) colMap.etStart = i;
    if (h === 'ET結束日' || h.includes('ET結束')) colMap.etEnd = i;
    if (h.includes('ET持續') || h.includes('ET天數')) colMap.etDays = i;
    if (h.includes('ET人數')) colMap.etPpl = i;
  });

  // Also try reading raw dates from the worksheet cells
  scheduleData = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || !r[colMap.unit]) continue;
    const unitName = r[colMap.unit].toString().trim();

    function parseDate(val) {
      if (!val) return null;
      if (val instanceof Date) return val;
      const s = val.toString().trim();
      // Try yyyy-mm-dd or yyyy/mm/dd
      const m = s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
      if (m) return new Date(+m[1], +m[2]-1, +m[3]);
      // Try serial number
      const num = parseFloat(s);
      if (!isNaN(num) && num > 40000) {
        const d = new Date((num - 25569) * 86400000);
        return d;
      }
      return null;
    }

    // Try to get dates from raw cell values for better accuracy
    function getCellDate(col) {
      const cellRef = XLSX.utils.encode_cell({r: i, c: col});
      const cell = ws[cellRef];
      if (!cell) return parseDate(r[col]);
      if (cell.t === 'd') return cell.v;
      if (cell.t === 'n') return new Date((cell.v - 25569) * 86400000);
      return parseDate(cell.v);
    }

    const entry = {
      unit: unitName,
      ohStart: getCellDate(colMap.ohStart),
      ohEnd: getCellDate(colMap.ohEnd),
      ndtStart: getCellDate(colMap.ndtStart),
      ndtEnd: getCellDate(colMap.ndtEnd),
      ndtDays: parseInt(r[colMap.ndtDays]) || 0,
      ndtPpl: parseInt(r[colMap.ndtPpl]) || 0,
      etStart: getCellDate(colMap.etStart),
      etEnd: getCellDate(colMap.etEnd),
      etDays: parseInt(r[colMap.etDays]) || 0,
      etPpl: parseInt(r[colMap.etPpl]) || 0,
    };
    scheduleData.push(entry);
  }

  classifyUnits();
  recalculate();
}

function classifyUnits() {
  datanUnits = [];
  supportUnits = [];
  for (const e of scheduleData) {
    if (e.unit.includes('大潭')) {
      const shortName = e.unit.replace(/大潭\s*/,'');
      datanUnits.push({...e, short: shortName});
    } else if (e.unit.includes('和平') || e.unit.includes('協和') || e.unit.includes('林口')) {
      supportUnits.push(e);
    }
  }
  // Auto-detect full date range and set period inputs
  let minD = null, maxD = null;
  for (const u of datanUnits) {
    if (u.ohStart && (!minD || u.ohStart < minD)) minD = u.ohStart;
    if (u.ohEnd && (!maxD || u.ohEnd > maxD)) maxD = u.ohEnd;
  }
  if (minD && maxD) {
    document.getElementById('periodStart').value = dateStr(minD);
    document.getElementById('periodEnd').value = dateStr(maxD);
  }
}

function resetPeriod() {
  var minD = null, maxD = null;
  for (var i = 0; i < datanUnits.length; i++) {
    var u = datanUnits[i];
    if (u.ohStart && (!minD || u.ohStart < minD)) minD = u.ohStart;
    if (u.ohEnd && (!maxD || u.ohEnd > maxD)) maxD = u.ohEnd;
  }
  if (minD && maxD) {
    document.getElementById('periodStart').value = dateStr(minD);
    document.getElementById('periodEnd').value = dateStr(maxD);
  }
}

// ===== CALCULATION ENGINE =====
function daysBetween(a, b) {
  if (!a || !b) return 0;
  return Math.round((b - a) / 86400000) + 1;
}

function dateStr(d) {
  if (!d) return '';
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getSupportDemand(day) {
  let total = 0;
  const details = [];
  for (const s of supportUnits) {
    let d = 0;
    if (s.ndtStart && s.ndtEnd && day >= s.ndtStart && day <= s.ndtEnd) d += s.ndtPpl;
    if (s.etStart && s.etEnd && day >= s.etStart && day <= s.etEnd) d += s.etPpl;
    if (d > 0) { total += d; details.push(s.unit + ':' + d); }
  }
  return {total, detail: details.join(', ')};
}

function getUnitDemand(u, day) {
  let d = 0;
  if (u.ndtStart && u.ndtEnd && day >= u.ndtStart && day <= u.ndtEnd) d += u.ndtPpl;
  if (u.etStart && u.etEnd && day >= u.etStart && day <= u.etEnd) d += u.etPpl;
  return d;
}

function getUnitActivePeriod(u) {
  const starts = [], ends = [];
  if (u.ndtStart) { starts.push(u.ndtStart); ends.push(u.ndtEnd); }
  if (u.etStart) { starts.push(u.etStart); ends.push(u.etEnd); }
  if (starts.length === 0) return {start: u.ohStart, end: u.ohEnd};
  return {start: new Date(Math.min(...starts)), end: new Date(Math.max(...ends))};
}

function onConfirm() {
  try {
    if (!scheduleData || datanUnits.length === 0) {
      alert('請先匯入大修檢測排程 Excel 檔案');
      return;
    }
    // Read all current parameter values and recalculate
    recalculate();
    // Visual feedback — flash the button
    var btn = document.getElementById('confirmBtn');
    btn.textContent = '\u2714 已更新';
    btn.style.background = '#27ae60';
    setTimeout(function() { btn.textContent = '\u2714 確認計算'; btn.style.background = ''; }, 1200);
  } catch(e) {
    alert('計算錯誤: ' + e.message);
    console.error(e);
  }
}

function recalculate() {
  if (!scheduleData || datanUnits.length === 0) {
    console.log('[recalc] no data, abort');
    return;
  }
  var TOTAL = parseInt(document.getElementById('totalPeople').value) || 26;
  var gMode = document.getElementById('gMode').value;

  // Determine simulation period — use user-specified or auto-detect
  var pStartStr = document.getElementById('periodStart').value;
  var pEndStr = document.getElementById('periodEnd').value;
  var simStart = pStartStr ? new Date(pStartStr + 'T00:00:00') : null;
  var simEnd = pEndStr ? new Date(pEndStr + 'T00:00:00') : null;

  if (!simStart || !simEnd || isNaN(simStart.getTime()) || isNaN(simEnd.getTime())) {
    simStart = null; simEnd = null;
    for (var i = 0; i < datanUnits.length; i++) {
      var uu = datanUnits[i];
      if (uu.ohStart && (!simStart || uu.ohStart < simStart)) simStart = uu.ohStart;
      if (uu.ohEnd && (!simEnd || uu.ohEnd > simEnd)) simEnd = uu.ohEnd;
    }
  }
  if (!simStart || !simEnd) {
    console.log('[recalc] no period, abort');
    return;
  }
  console.log('[recalc] TOTAL=' + TOTAL + ' period=' + dateStr(simStart) + '~' + dateStr(simEnd) + ' units=' + datanUnits.length);

  // Filter 大潭 units: only include units whose overhaul period overlaps with simulation period
  var filteredUnits = [];
  for (var fi = 0; fi < datanUnits.length; fi++) {
    var fu = datanUnits[fi];
    if (fu.ohStart && fu.ohEnd && fu.ohStart <= simEnd && fu.ohEnd >= simStart) {
      filteredUnits.push(fu);
    }
  }
  console.log('[recalc] filteredUnits=' + filteredUnits.length);

  // Day-by-day simulation
  var unitPersonDays = {};
  var unitActiveDays = {};
  for (var ui = 0; ui < filteredUnits.length; ui++) { unitPersonDays[filteredUnits[ui].short] = 0; unitActiveDays[filteredUnits[ui].short] = 0; }

  dailyData = [];
  var day = new Date(simStart);
  while (day <= simEnd) {
    var sup = getSupportDemand(day);
    var available = Math.max(0, TOTAL - sup.total);

    var active = [];
    for (var ai = 0; ai < filteredUnits.length; ai++) {
      var demand = getUnitDemand(filteredUnits[ai], day);
      if (demand > 0) active.push({unit: filteredUnits[ai].short, demand: demand});
    }

    var totalDemand = 0;
    for (var di = 0; di < active.length; di++) totalDemand += active[di].demand;
    var row = {date: dateStr(day), support: sup.total, supportDetail: sup.detail, available: available};
    var dayTotal = 0;
    for (var ri = 0; ri < filteredUnits.length; ri++) row[filteredUnits[ri].short] = 0;

    for (var si = 0; si < active.length; si++) {
      var share = totalDemand > 0 ? available * (active[si].demand / totalDemand) : 0;
      row[active[si].unit] = Math.round(share * 10) / 10;
      dayTotal += row[active[si].unit];
      unitPersonDays[active[si].unit] = (unitPersonDays[active[si].unit]||0) + share;
      unitActiveDays[active[si].unit] = (unitActiveDays[active[si].unit]||0) + 1;
    }
    row.totalDatan = Math.round(dayTotal * 10) / 10;
    dailyData.push(row);
    day.setDate(day.getDate() + 1);
  }

  // Calculate F and G for each unit
  var bridgeGap = parseInt(document.getElementById('bridgeGap').value) || 3;
  allocationResult = [];

  // Build sorted list of filtered 大潭 inspection periods for bridging calculation
  var allPeriods = [];
  for (var pi = 0; pi < filteredUnits.length; pi++) {
    var pp = getUnitActivePeriod(filteredUnits[pi]);
    if (pp.start && pp.end) {
      allPeriods.push({unit: filteredUnits[pi].short, start: pp.start, end: pp.end});
    }
  }
  allPeriods.sort(function(a, b) { return a.start - b.start; });

  // For each unit, calculate bridged G
  function calcBridgedG(unitShort) {
    var thisUnit = null;
    for (var bi = 0; bi < allPeriods.length; bi++) {
      if (allPeriods[bi].unit === unitShort) { thisUnit = allPeriods[bi]; break; }
    }
    if (!thisUnit) return 0;
    var baseDays = daysBetween(thisUnit.start, thisUnit.end);

    var nextStart = null;
    for (var ni = 0; ni < allPeriods.length; ni++) {
      if (allPeriods[ni].start > thisUnit.end) {
        if (!nextStart || allPeriods[ni].start < nextStart) nextStart = allPeriods[ni].start;
      }
    }
    if (!nextStart) return baseDays;

    var gapDays = Math.round((nextStart - thisUnit.end) / 86400000) - 1;
    if (gapDays > 0 && gapDays <= bridgeGap) {
      return baseDays + gapDays;
    }
    return baseDays;
  }

  for (var gi = 0; gi < filteredUnits.length; gi++) {
    var gu = filteredUnits[gi];
    var period = getUnitActivePeriod(gu);
    var inspDays = daysBetween(period.start, period.end);
    var ohDays = daysBetween(gu.ohStart, gu.ohEnd);

    var effectiveOhStart = gu.ohStart > simStart ? gu.ohStart : simStart;
    var effectiveOhEnd = gu.ohEnd < simEnd ? gu.ohEnd : simEnd;
    var clampedOhDays = daysBetween(effectiveOhStart, effectiveOhEnd);

    var effectiveInspStart = period.start > simStart ? period.start : simStart;
    var effectiveInspEnd = period.end < simEnd ? period.end : simEnd;
    var clampedInspDays = Math.max(0, daysBetween(effectiveInspStart, effectiveInspEnd));

    var gDays;
    if (gMode === 'overhaul') {
      gDays = clampedOhDays;
    } else if (gMode === 'ndt_et_bridge') {
      gDays = calcBridgedG(gu.short);
    } else {
      gDays = clampedInspDays;
    }

    var avgPpl = gDays > 0 ? unitPersonDays[gu.short] / (unitActiveDays[gu.short] || 1) : 0;
    var fVal = Math.max(1, Math.round(avgPpl));

    allocationResult.push({
      unit: gu.short,
      ohStart: gu.ohStart, ohEnd: gu.ohEnd,
      ndtStart: gu.ndtStart, ndtEnd: gu.ndtEnd,
      ndtPpl: gu.ndtPpl,
      etStart: gu.etStart, etEnd: gu.etEnd,
      etPpl: gu.etPpl,
      ohDays: clampedOhDays, inspDays: clampedInspDays,
      F: fVal, G: gDays,
      personDays: unitPersonDays[gu.short]
    });
  }

  console.log('[recalc] done: ' + allocationResult.length + ' units, ' + dailyData.length + ' days');
  renderTable();
  renderChart();
  document.getElementById('exportBar').style.display = 'flex';
  var pStart = document.getElementById('periodStart').value || dateStr(simStart);
  var pEnd = document.getElementById('periodEnd').value || dateStr(simEnd);
  document.getElementById('exportInfo').textContent = allocationResult.length + ' 機組 ｜ ' + dailyData.length + ' 天 ｜ ' + pStart + ' ~ ' + pEnd;
}

// ===== TABLE RENDERING =====
function renderTable() {
  var rate = parseInt(document.getElementById('housingRate').value) || 2190;
  var section = document.getElementById('tableSection');
  var emptyEl = document.getElementById('emptyTable');
  if (emptyEl) emptyEl.style.display = 'none';

  let html = '<table><thead><tr>';
  const gLabel = document.getElementById('gMode').value === 'ndt_et_bridge' ? '住宿天數<br>(G)含橋接' : '住宿天數<br>(G)';
  html += '<th>機組</th><th>排程日期</th><th>天數</th>';
  html += '<th>NDT</th><th>ET</th>';
  html += `<th>出差人數<br>(F)</th><th>${gLabel}</th><th>住宿金額<br>小計</th>`;
  html += '</tr></thead><tbody>';

  let totalF = 0, totalG = 0, totalH = 0;

  // Group units by overhaul overlap proximity
  const grouped = groupUnits(allocationResult);

  for (const g of grouped) {
    let groupH = 0;
    const groupRows = [];
    for (const u of g.units) {
      const H = rate * u.F * u.G;
      groupH += H;
      totalF += u.F; totalG += u.G; totalH += H;

      const schedStr = formatDateRange(u.ohStart, u.ohEnd);
      const ndtStr = u.ndtPpl > 0 ? `${u.ndtPpl}人/${u.ndtStart ? daysBetween(u.ndtStart, u.ndtEnd) : 0}天` : '-';
      const etStr = u.etPpl > 0 ? `${u.etPpl}人/${u.etStart ? daysBetween(u.etStart, u.etEnd) : 0}天` : '-';

      groupRows.push(`<tr>
        <td class="cell-unit">${u.unit}</td>
        <td>${schedStr}</td>
        <td>${u.ohDays}</td>
        <td class="cell-ndt">${ndtStr}</td>
        <td class="cell-et">${etStr}</td>
        <td class="cell-f">${u.F}</td>
        <td class="cell-g">${u.G}</td>
        <td class="cell-h">${H.toLocaleString()}</td>
      </tr>`);
    }
    html += `<tr class="group-header"><td colspan="7">${g.label}</td><td class="cell-h">${groupH.toLocaleString()}</td></tr>`;
    html += groupRows.join('');
  }

  html += `<tr class="total-row">
    <td colspan="5">總計</td>
    <td class="cell-f">${totalF}</td><td>${totalG}</td>
    <td class="cell-h">${totalH.toLocaleString()}</td>
  </tr>`;
  html += '</tbody></table>';
  section.innerHTML = html;
}

function groupUnits(units) {
  // Group by GT/ST number series (e.g., GT31/GT32/ST3 = group 3)
  const groups = {};
  for (const u of units) {
    const m = u.unit.match(/(GT|ST)(\d)/);
    if (!m) continue;
    const gNum = m[2];
    if (!groups[gNum]) groups[gNum] = {num: gNum, units: [], minStart: null, label: ''};
    groups[gNum].units.push(u);
    if (!groups[gNum].minStart || u.ohStart < groups[gNum].minStart) groups[gNum].minStart = u.ohStart;
  }
  const sorted = Object.values(groups).sort((a, b) => a.minStart - b.minStart);
  sorted.forEach((g, i) => {
    const types = [...new Set(g.units.map(u => { const m2 = u.unit.match(/ST/); return m2 ? 'ST' : 'GT'; }))];
    const hasST = g.units.some(u => u.unit.startsWith('ST'));
    const hasMultiGT = g.units.filter(u => u.unit.startsWith('GT')).length >= 2;
    const tiMi = hasMultiGT ? 'TI' : (hasST ? 'MI' : 'TI');
    g.label = `第${i+1}組 (${tiMi}) — ${g.units.map(u=>u.unit).join('/')}`;
  });
  return sorted;
}

function formatDateRange(start, end) {
  if (!start || !end) return '-';
  const s = `${start.getMonth()+1}/${start.getDate()}`;
  const e = `${end.getMonth()+1}/${end.getDate()}`;
  return `${s}-${e}`;
}

// ===== CHART =====
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const MARGIN = {top: 45, right: 16, bottom: 55, left: 46};

function setChartRes(res, btn) {
  chartRes = res;
  document.querySelectorAll('.chart-controls button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

function renderChart() {
  if (dailyData.length === 0) return;
  var emptyChartEl = document.getElementById('emptyChart');
  if (emptyChartEl) emptyChartEl.style.display = 'none';
  canvas.style.display = 'block';
  document.getElementById('legendBar').style.display = 'flex';

  const TOTAL = parseInt(document.getElementById('totalPeople').value) || 26;
  const unitNames = allocationResult.map(u => u.unit);

  // Prepare data
  let data;
  if (chartRes === 'week') {
    data = aggregateWeekly(dailyData, unitNames);
  } else {
    data = dailyData.map(d => ({...d}));
  }

  const n = data.length;
  const dpr = window.devicePixelRatio || 1;
  const containerW = document.getElementById('chartArea').clientWidth - 16;
  const W = Math.max(chartRes === 'day' ? n * 8 + MARGIN.left + MARGIN.right : n * 22 + MARGIN.left + MARGIN.right, containerW);
  const H = Math.max(document.getElementById('chartArea').clientHeight - 16, 350);

  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const plotW = W - MARGIN.left - MARGIN.right;
  const plotH = H - MARGIN.top - MARGIN.bottom;
  const barW = plotW / n;

  // Find max Y
  let maxStack = 0;
  for (const d of data) {
    let s = 0;
    for (const u of unitNames) { if (!hiddenUnits.has(u)) s += (d[u]||0); }
    s += (d.support||0);
    if (s > maxStack) maxStack = s;
  }
  const MAX_Y = Math.max(TOTAL + 4, Math.ceil(maxStack / 5) * 5 + 5);
  const yScale = plotH / MAX_Y;

  // Clear
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  // Grid
  for (let v = 0; v <= MAX_Y; v += 5) {
    const y = MARGIN.top + plotH - v * yScale;
    ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(MARGIN.left, y); ctx.lineTo(W - MARGIN.right, y); ctx.stroke();
    ctx.fillStyle = '#888'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(v, MARGIN.left - 5, y + 3);
  }

  // Reference line
  const yRef = MARGIN.top + plotH - TOTAL * yScale;
  ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 1.5; ctx.setLineDash([5,3]);
  ctx.beginPath(); ctx.moveTo(MARGIN.left, yRef); ctx.lineTo(W - MARGIN.right, yRef); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#e74c3c'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(TOTAL + '人上限', MARGIN.left + 3, yRef - 4);

  // Bars
  for (let i = 0; i < n; i++) {
    const x = MARGIN.left + i * barW;
    let yBottom = MARGIN.top + plotH;

    for (const u of unitNames) {
      if (hiddenUnits.has(u)) continue;
      const val = data[i][u] || 0;
      if (val > 0.05) {
        const h = val * yScale;
        ctx.fillStyle = getColor(u);
        ctx.fillRect(x + 0.3, yBottom - h, barW - 0.6, h);
        yBottom -= h;
      }
    }

    // Support hatching
    const sup = data[i].support || 0;
    if (sup > 0) {
      const h = sup * yScale;
      const sy = yBottom - h;
      ctx.fillStyle = 'rgba(231,76,60,0.1)';
      ctx.fillRect(x + 0.3, sy, barW - 0.6, h);
      ctx.strokeStyle = 'rgba(231,76,60,0.3)'; ctx.lineWidth = 0.4;
      for (let dy = 0; dy < h + barW; dy += 4) {
        ctx.beginPath();
        ctx.moveTo(x + 0.3, sy + Math.min(dy, h));
        ctx.lineTo(x + 0.3 + Math.min(dy, barW - 0.6), sy);
        ctx.stroke();
      }
    }

    // Exceed marker
    let dayStack = 0;
    for (const u of unitNames) { if (!hiddenUnits.has(u)) dayStack += (data[i][u]||0); }
    if (dayStack > TOTAL) {
      const ey = MARGIN.top + plotH - dayStack * yScale;
      ctx.fillStyle = 'rgba(231,76,60,.6)';
      ctx.beginPath(); ctx.moveTo(x+barW/2-3,ey-1); ctx.lineTo(x+barW/2+3,ey-1); ctx.lineTo(x+barW/2,ey-7); ctx.fill();
    }
  }

  // X axis
  ctx.fillStyle = '#666'; ctx.font = '9px sans-serif';
  const step = chartRes === 'day' ? 7 : 1;
  for (let i = 0; i < n; i++) {
    if (i % step === 0) {
      const x = MARGIN.left + i * barW + barW/2;
      ctx.save(); ctx.translate(x, MARGIN.top + plotH + 7);
      ctx.rotate(-Math.PI/4); ctx.textAlign = 'right';
      ctx.fillText(data[i].date.slice(5), 0, 0);
      ctx.restore();
    }
  }

  // Month dividers
  let prevM = '';
  for (let i = 0; i < n; i++) {
    const m = data[i].date.slice(0, 7);
    if (m !== prevM) {
      const x = MARGIN.left + i * barW;
      ctx.strokeStyle = '#bbb'; ctx.lineWidth = 0.7;
      ctx.beginPath(); ctx.moveTo(x, MARGIN.top); ctx.lineTo(x, MARGIN.top + plotH); ctx.stroke();
      ctx.fillStyle = '#777'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(m, x + 2, MARGIN.top - 5);
      prevM = m;
    }
  }

  // Y title
  ctx.save(); ctx.translate(12, MARGIN.top + plotH/2);
  ctx.rotate(-Math.PI/2); ctx.fillStyle = '#333'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('人數', 0, 0); ctx.restore();

  // Legend
  renderLegend(unitNames);

  // Store for tooltip
  canvas._chartData = data;
  canvas._unitNames = unitNames;
  canvas._barW = barW;
  canvas._plotH = plotH;
  canvas._yScale = yScale;
  canvas._TOTAL = TOTAL;
}

function aggregateWeekly(src, unitNames) {
  const result = [];
  for (let i = 0; i < src.length; i += 7) {
    const chunk = src.slice(i, Math.min(i+7, src.length));
    const row = {date: chunk[0].date, support: 0, supportDetail: chunk[0].supportDetail, totalDatan: 0};
    for (const u of unitNames) row[u] = 0;
    for (const d of chunk) {
      row.support += (d.support||0);
      row.totalDatan += (d.totalDatan||0);
      for (const u of unitNames) row[u] += (d[u]||0);
    }
    const n = chunk.length;
    row.support /= n; row.totalDatan /= n;
    for (const u of unitNames) row[u] /= n;
    result.push(row);
  }
  return result;
}

function renderLegend(unitNames) {
  const bar = document.getElementById('legendBar');
  bar.innerHTML = '';
  const grouped = groupUnits(allocationResult);
  for (const g of grouped) {
    const gl = document.createElement('span');
    gl.className = 'gl'; gl.textContent = g.num + ':';
    bar.appendChild(gl);
    for (const u of g.units) {
      const li = document.createElement('div');
      li.className = 'li' + (hiddenUnits.has(u.unit) ? ' dimmed' : '');
      li.dataset.unit = u.unit;
      li.innerHTML = `<span class="lc" style="background:${getColor(u.unit)}"></span>${u.unit}`;
      li.onclick = () => { toggleUnit(u.unit); };
      bar.appendChild(li);
    }
  }
  const si = document.createElement('div');
  si.className = 'li';
  si.innerHTML = '<span class="lc" style="background:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(231,76,60,.3) 2px,rgba(231,76,60,.3) 4px);border:1px dashed rgba(231,76,60,.4)"></span>支援';
  bar.appendChild(si);
}

function toggleUnit(u) {
  if (hiddenUnits.has(u)) hiddenUnits.delete(u); else hiddenUnits.add(u);
  renderChart();
}

// Tooltip
canvas.addEventListener('mousemove', function(e) {
  if (!this._chartData) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const data = this._chartData;
  const n = data.length;
  const idx = Math.floor((mx - MARGIN.left) / this._barW);
  if (idx < 0 || idx >= n) { document.getElementById('tooltip').style.display = 'none'; return; }

  const tt = document.getElementById('tooltip');
  let h = `<div class="td">${data[idx].date}</div>`;
  let total = 0;
  for (const u of this._unitNames) {
    const v = data[idx][u] || 0;
    if (v > 0.05 && !hiddenUnits.has(u)) {
      h += `<div class="tr"><span><span class="dot" style="background:${getColor(u)}"></span>${u}</span><span>${v.toFixed(1)}</span></div>`;
      total += v;
    }
  }
  h += `<div class="tr" style="font-weight:bold;border-top:1px solid rgba(255,255,255,.3);padding-top:3px;margin-top:3px"><span>大潭合計</span><span>${Math.round(total)}人</span></div>`;
  if (total > this._TOTAL) h += `<div style="color:#f39c12;font-weight:bold">⚠ 超過${this._TOTAL}人 (+${Math.round(total - this._TOTAL)})</div>`;
  const sup = data[idx].support || 0;
  if (sup > 0) h += `<div style="color:#e74c3c;font-style:italic;margin-top:4px;border-top:1px solid rgba(255,255,255,.2);padding-top:4px">支援: ${Math.round(sup)}人 (${data[idx].supportDetail||''})</div>`;
  tt.innerHTML = h;
  tt.style.display = 'block';
  let tx = e.clientX + 15, ty = e.clientY - 10;
  if (tx + 300 > window.innerWidth) tx = e.clientX - 310;
  if (ty + tt.offsetHeight > window.innerHeight) ty = window.innerHeight - tt.offsetHeight - 10;
  tt.style.left = tx+'px'; tt.style.top = ty+'px';
});
canvas.addEventListener('mouseleave', () => { document.getElementById('tooltip').style.display = 'none'; });

// ===== EXCEL EXPORT =====
function exportExcel(mode) {
  if (allocationResult.length === 0) return;
  const rate = parseInt(document.getElementById('housingRate').value) || 2190;
  const wb = XLSX.utils.book_new();

  // Sheet 1: 住宿需求預估表
  const wsData = [['115年下-116年上大潭發電廠大修期間工作人員出差住宿需求預估表'],
    [],
    ['序號','機組別','排程日期','天數','住宿金額(未稅)','出差人數(自有)','住宿天數(小計)','住宿金額小計(未稅)','住宿金額合計(未稅)']
  ];

  const grouped = groupUnits(allocationResult);
  let totalF = 0, totalG = 0, totalH = 0;
  let grpIdx = 0;
  for (const g of grouped) {
    grpIdx++;
    let groupH = 0;
    const grpRows = [];
    for (const u of g.units) {
      const H = rate * u.F * u.G;
      groupH += H; totalF += u.F; totalG += u.G; totalH += H;
      grpRows.push(['', u.unit, formatDateRange(u.ohStart, u.ohEnd), u.ohDays, rate, u.F, u.G, H, '']);
    }
    // First row of group gets group label and group total
    grpRows[0][0] = grpIdx;
    grpRows[0][8] = groupH;
    for (const r of grpRows) wsData.push(r);
  }
  wsData.push(['總計','','','',rate, totalF, totalG, totalH, totalH]);

  const ws1 = XLSX.utils.aoa_to_sheet(wsData);
  // Set column widths
  ws1['!cols'] = [{wch:6},{wch:8},{wch:14},{wch:6},{wch:12},{wch:12},{wch:12},{wch:16},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws1, '住宿需求預估表');

  if (mode === 'full') {
    // Sheet 2: 每日人力配置
    const unitNames = allocationResult.map(u => u.unit);
    const wsDaily = [['日期','支援外派','大潭可用', ...unitNames, '大潭合計','支援明細']];
    for (const d of dailyData) {
      wsDaily.push([d.date, d.support, d.available, ...unitNames.map(u => Math.round((d[u]||0)*10)/10), d.totalDatan, d.supportDetail]);
    }
    const ws2 = XLSX.utils.aoa_to_sheet(wsDaily);
    XLSX.utils.book_append_sheet(wb, ws2, '每日配置明細');
  }

  XLSX.writeFile(wb, '大潭住宿需求預估表_計算結果.xlsx');
}
